<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Consultorias — Densidade de Casos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0d1117;color:#cdd9e5;min-height:100vh}
#pg-setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
#pg-app{display:none;padding:24px;max-width:1400px;margin:0 auto}
.box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px;max-width:560px;width:100%}
h1{color:#58a6ff;font-size:20px;margin-bottom:6px}
.sub{color:#8b949e;font-size:13px;margin-bottom:24px}
label{display:block;font-size:12px;color:#8b949e;margin-bottom:3px;margin-top:12px}
input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#cdd9e5;font-size:13px}
input:focus{outline:none;border-color:#58a6ff}
.btn-primary{display:block;width:100%;padding:10px;margin-top:20px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.btn-primary:hover{background:#2ea043}
.btn-sm{background:#21262d;color:#cdd9e5;border:1px solid #30363d;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-sm:hover{background:#30363d}
.btn-tab{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;margin-right:6px;margin-bottom:6px}
.btn-tab.active{background:#388bfd22;color:#58a6ff;border-color:#388bfd}
.err{color:#f85149;font-size:13px;margin-top:12px;padding:10px;background:#ff00001a;border-radius:6px;display:none}
.info{color:#8b949e;font-size:13px;margin-top:12px;display:none}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center}
.stat-val{font-size:24px;font-weight:bold;margin-bottom:4px}
.stat-lbl{font-size:11px;color:#8b949e;text-transform:uppercase}
.chart-wrap{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:20px}
.view-tabs{margin-bottom:12px}
h2{color:#cdd9e5;font-size:16px;margin-bottom:16px}
#app-title{color:#58a6ff;font-size:22px;margin-bottom:4px}
#app-sub{color:#8b949e;font-size:13px;margin-bottom:20px}
.year-tabs{margin-bottom:16px}
</style>
</head>
<body>

<div id="pg-setup">
  <div class="box">
    <h1>&#x1F4CA; Configurar Dashboard</h1>
    <p class="sub">Insira o token e os parâmetros para carregar os dados do Airtable</p>

    <label>Token Pessoal do Airtable</label>
    <input type="password" id="inp-token" placeholder="patXXXXXX...">

    <label>ID da Base</label>
    <input type="text" id="inp-base" placeholder="appXXXXXXXX">

    <label>ID da Tabela</label>
    <input type="text" id="inp-table" placeholder="tblXXXXXXXX">

    <label>ID da View (opcional)</label>
    <input type="text" id="inp-view" placeholder="viwXXXXXXXX">

    <label>Nome do Campo: Data Inicial (início do acompanhamento)</label>
    <input type="text" id="inp-field1" placeholder="Data Avaliação">

    <label>Nome do Campo: Data Final (alta / encerramento)</label>
    <input type="text" id="inp-field2" placeholder="Data Alta Cardiológica">

    <div class="err" id="err-setup"></div>
    <div class="info" id="info-setup"></div>

    <button class="btn-primary" onclick="doLoad()">Carregar Dados</button>
  </div>
</div>

<div id="pg-app">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px">
    <div>
      <div id="app-title">&#x1F4CA; Densidade de Casos</div>
      <div id="app-sub"></div>
    </div>
    <button class="btn-sm" onclick="doReset()">&#x2699;&#xFE0F; Reconfigurar</button>
  </div>

  <div class="year-tabs" id="year-tabs"></div>
  <div class="view-tabs" id="view-tabs"></div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="chart-wrap"><canvas id="main-chart" height="100"></canvas></div>
</div>

<script>
// ---- globals ----
var G_token, G_base, G_table, G_view, G_field1, G_field2;
var G_records = [];
var G_dailyMap = {};
var G_years = [];
var G_activeYear = 'total';
var G_activeView = 'diario';
var G_chart = null;

var VIEWS = [
  {id:'diario',    label:'Diário'},
  {id:'semanal',   label:'Semanal'},
  {id:'mensal-max',label:'Mensal (Máx)'},
  {id:'mensal-med',label:'Mensal (Média)'},
  {id:'mensal-mdn',label:'Mensal (Mediana)'}
];

function doLoad() {
  var token  = document.getElementById('inp-token').value.trim();
  var base   = document.getElementById('inp-base').value.trim();
  var table  = document.getElementById('inp-table').value.trim();
  var view   = document.getElementById('inp-view').value.trim();
  var field1 = document.getElementById('inp-field1').value.trim();
  var field2 = document.getElementById('inp-field2').value.trim();

  if (!token || !base || !table || !field1 || !field2) {
    showErr('err-setup', 'Preencha todos os campos obrigatórios (token, base, tabela, campos de data).');
    return;
  }

  showErr('err-setup', '');
  showInfo('info-setup', 'Carregando registros...');

  G_token  = token;
  G_base   = base;
  G_table  = table;
  G_view   = view;
  G_field1 = field1;
  G_field2 = field2;

  localStorage.setItem('at_token',  token);
  localStorage.setItem('at_base',   base);
  localStorage.setItem('at_table',  table);
  localStorage.setItem('at_view',   view);
  localStorage.setItem('at_field1', field1);
  localStorage.setItem('at_field2', field2);

  fetchAll([], null);
}

function fetchAll(accumulated, offset) {
  var url = 'https://api.airtable.com/v0/' + G_base + '/' + G_table + '?pageSize=100';
  if (G_view)  url += '&view=' + encodeURIComponent(G_view);
  if (offset)  url += '&offset=' + encodeURIComponent(offset);

  fetch(url, { headers: { 'Authorization': 'Bearer ' + G_token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showErr('err-setup', 'Erro da API: ' + data.error.message + ' (' + data.error.type + ')');
        showInfo('info-setup', '');
        return;
      }
      var recs = data.records || [];
      for (var i = 0; i < recs.length; i++) {
        accumulated.push(recs[i]);
      }
      showInfo('info-setup', 'Carregados ' + accumulated.length + ' registros...');
      if (data.offset) {
        fetchAll(accumulated, data.offset);
      } else {
        processRecords(accumulated);
      }
    })
    .catch(function(e) {
      showErr('err-setup', 'Erro de rede: ' + e.message);
      showInfo('info-setup', '');
    });
}

function processRecords(recs) {
  var today = new Date();
  today.setHours(0,0,0,0);

  var valid = 0;
  var dailyMap = {};

  for (var i = 0; i < recs.length; i++) {
    var f = recs[i].fields;
    var startVal = f[G_field1];
    var endVal   = f[G_field2];

    if (!startVal) continue;

    var startDate = new Date(startVal);
    startDate.setHours(0,0,0,0);
    if (isNaN(startDate.getTime())) continue;

    var endDate;
    if (endVal) {
      endDate = new Date(endVal);
      endDate.setHours(0,0,0,0);
      if (isNaN(endDate.getTime())) endDate = new Date(today);
    } else {
      endDate = new Date(today);
    }

    if (endDate < startDate) endDate = new Date(startDate);

    valid++;

    var cur = new Date(startDate);
    while (cur <= endDate) {
      var key = cur.toISOString().slice(0,10);
      dailyMap[key] = (dailyMap[key] || 0) + 1;
      cur.setDate(cur.getDate() + 1);
    }
  }

  if (valid === 0) {
    showErr('err-setup', 'Nenhum registro válido. Verifique os nomes dos campos (certifique-se de usar o nome exato como aparece no Airtable).');
    showInfo('info-setup', 'Total de registros recebidos: ' + recs.length + '. Campos tentados: "' + G_field1 + '" e "' + G_field2 + '".');
    return;
  }

  G_records  = recs;
  G_dailyMap = dailyMap;

  var yearsSet = {};
  var allKeys = Object.keys(dailyMap);
  for (var j = 0; j < allKeys.length; j++) {
    yearsSet[allKeys[j].slice(0,4)] = true;
  }
  G_years = Object.keys(yearsSet).sort();

  G_activeYear = 'total';
  G_activeView = 'diario';

  showInfo('info-setup', '');
  showErr('err-setup', '');

  document.getElementById('app-sub').textContent = valid + ' registros · ' + allKeys.length + ' dias analisados';
  document.getElementById('pg-setup').style.display = 'none';
  document.getElementById('pg-app').style.display = 'block';

  buildYearTabs();
  buildViewTabs();
  renderChart();
}

function buildYearTabs() {
  var container = document.getElementById('year-tabs');
  var html = '';
  var tabs = [{id:'total', label:'Período Total'}];
  for (var i = 0; i < G_years.length; i++) {
    tabs.push({id: G_years[i], label: G_years[i]});
  }
  for (var j = 0; j < tabs.length; j++) {
    var t = tabs[j];
    var cls = t.id === G_activeYear ? 'btn-tab active' : 'btn-tab';
    html += '<button class="' + cls + '" onclick="selectYear('' + t.id + '')">' + t.label + '</button>';
  }
  container.innerHTML = html;
}

function buildViewTabs() {
  var container = document.getElementById('view-tabs');
  var html = '';
  for (var i = 0; i < VIEWS.length; i++) {
    var v = VIEWS[i];
    var cls = v.id === G_activeView ? 'btn-tab active' : 'btn-tab';
    html += '<button class="' + cls + '" onclick="selectView('' + v.id + '')">' + v.label + '</button>';
  }
  container.innerHTML = html;
}

function selectYear(yr) {
  G_activeYear = yr;
  buildYearTabs();
  renderChart();
}

function selectView(vw) {
  G_activeView = vw;
  buildViewTabs();
  renderChart();
}

function getFilteredMap() {
  if (G_activeYear === 'total') return G_dailyMap;
  var filtered = {};
  var keys = Object.keys(G_dailyMap);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].slice(0,4) === G_activeYear) {
      filtered[keys[i]] = G_dailyMap[keys[i]];
    }
  }
  return filtered;
}

function buildChartData(filteredMap) {
  var keys = Object.keys(filteredMap).sort();
  if (keys.length === 0) return {labels:[], data:[]};

  if (G_activeView === 'diario') {
    return {labels: keys, data: keys.map(function(k){return filteredMap[k];})};
  }

  if (G_activeView === 'semanal') {
    var weeks = {};
    for (var i = 0; i < keys.length; i++) {
      var d = new Date(keys[i]);
      var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var mon = new Date(d);
      mon.setDate(diff);
      mon.setHours(0,0,0,0);
      var wk = mon.toISOString().slice(0,10);
      if (!weeks[wk]) weeks[wk] = [];
      weeks[wk].push(filteredMap[keys[i]]);
    }
    var wkeys = Object.keys(weeks).sort();
    return {labels: wkeys, data: wkeys.map(function(k){return Math.max.apply(null,weeks[k]);})};
  }

  // monthly
  var months = {};
  for (var j = 0; j < keys.length; j++) {
    var mk = keys[j].slice(0,7);
    if (!months[mk]) months[mk] = [];
    months[mk].push(filteredMap[keys[j]]);
  }
  var mkeys = Object.keys(months).sort();

  if (G_activeView === 'mensal-max') {
    return {labels: mkeys, data: mkeys.map(function(k){return Math.max.apply(null,months[k]);})};
  }
  if (G_activeView === 'mensal-med') {
    return {labels: mkeys, data: mkeys.map(function(k){
      var arr = months[k];
      return Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length * 10)/10;
    })};
  }
  if (G_activeView === 'mensal-mdn') {
    return {labels: mkeys, data: mkeys.map(function(k){
      var arr = months[k].slice().sort(function(a,b){return a-b;});
      var mid = Math.floor(arr.length/2);
      return arr.length%2 ? arr[mid] : Math.round((arr[mid-1]+arr[mid])/2*10)/10;
    })};
  }
  return {labels:[], data:[]};
}

function calcStats(filteredMap) {
  var vals = Object.values ? Object.values(filteredMap) : Object.keys(filteredMap).map(function(k){return filteredMap[k];});
  if (vals.length === 0) return {max:0, mean:0, median:0, active:0, days:0};
  var max = Math.max.apply(null, vals);
  var mean = Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10;
  var sorted = vals.slice().sort(function(a,b){return a-b;});
  var mid = Math.floor(sorted.length/2);
  var median = sorted.length%2 ? sorted[mid] : Math.round((sorted[mid-1]+sorted[mid])/2*10)/10;
  var today = new Date().toISOString().slice(0,10);
  var active = filteredMap[today] || 0;
  return {max:max, mean:mean, median:median, active:active, days:vals.length};
}

function renderChart() {
  var filteredMap = getFilteredMap();
  var cd = buildChartData(filteredMap);
  var stats = calcStats(filteredMap);

  // Stats cards
  var sg = document.getElementById('stats-grid');
  sg.innerHTML =
    statCard('#f97316', stats.max,    'Pico Máximo') +
    statCard('#3b82f6', stats.mean,   'Média Diária') +
    statCard('#ec4899', stats.median, 'Mediana Diária') +
    statCard('#22c55e', stats.active, 'Casos Ativos Hoje') +
    statCard('#a855f7', stats.days,   'Dias Analisados');

  // Chart
  var ctx = document.getElementById('main-chart').getContext('2d');
  if (G_chart) { G_chart.destroy(); G_chart = null; }

  G_chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: cd.labels,
      datasets: [{
        label: 'Casos Simultâneos',
        data: cd.data,
        backgroundColor: 'rgba(56,139,253,0.5)',
        borderColor: '#388bfd',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#cdd9e5' } }
      },
      scales: {
        x: { ticks: { color: '#8b949e', maxTicksLimit: 20 }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' }, beginAtZero: true }
      }
    }
  });
}

function statCard(color, val, lbl) {
  return '<div class="stat-card"><div class="stat-val" style="color:' + color + '">' + val + '</div><div class="stat-lbl">' + lbl + '</div></div>';
}

function showErr(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function showInfo(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function doReset() {
  document.getElementById('pg-app').style.display = 'none';
  document.getElementById('pg-setup').style.display = 'flex';
}

// Restore saved values on load
(function() {
  var t = localStorage.getItem('at_token');
  var b = localStorage.getItem('at_base');
  var tb = localStorage.getItem('at_table');
  var v = localStorage.getItem('at_view');
  var f1 = localStorage.getItem('at_field1');
  var f2 = localStorage.getItem('at_field2');
  if (t)  document.getElementById('inp-token').value  = t;
  if (b)  document.getElementById('inp-base').value   = b;
  if (tb) document.getElementById('inp-table').value  = tb;
  if (v)  document.getElementById('inp-view').value   = v;
  if (f1) document.getElementById('inp-field1').value = f1;
  if (f2) document.getElementById('inp-field2').value = f2;
})();
</script>
</body>
</html>
