<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Consultorias — Densidade de Casos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0d1117;color:#cdd9e5;min-height:100vh}
#pg-setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
#pg-app{display:none;padding:24px;max-width:1200px;margin:0 auto}
.box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:32px;max-width:560px;width:100%}
h1{color:#58a6ff;font-size:20px;margin-bottom:6px}
.sub{color:#8b949e;font-size:13px;margin-bottom:24px}
label{display:block;font-size:12px;color:#8b949e;margin-bottom:3px;margin-top:12px}
input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#cdd9e5;font-size:13px}
input:focus{outline:none;border-color:#58a6ff}
.btn-primary{display:block;width:100%;padding:10px;margin-top:20px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#2ea043}
.btn-sm{background:#21262d;color:#cdd9e5;border:1px solid #30363d;padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-sm:hover{background:#30363d}
#msg{min-height:20px;font-size:13px;margin-top:12px;padding:8px;border-radius:6px;display:none}
.msg-err{background:#1c0a0a;border:1px solid #f85149;color:#f85149}
.msg-ok{background:#0a1c0a;border:1px solid #3fb950;color:#3fb950}
.msg-info{background:#0a1118;border:1px solid #58a6ff;color:#58a6ff}
.note{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;color:#8b949e;margin-top:16px;line-height:1.6}
.row2{display:flex;gap:8px}
.row2>div{flex:1}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:18px}
.hbtns{display:flex;gap:8px}
#tabs,#modes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab,.mode{padding:7px 15px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#21262d;color:#8b949e}
.tab.on,.mode.on{background:#1f6feb;color:#fff}
#stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 16px;text-align:center;flex:1;min-width:100px}
.cv{font-size:24px;font-weight:700;margin:4px 0}
.cl,.cs{font-size:11px;color:#8b949e}
.cw{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;height:400px}
#toast{position:fixed;top:20px;right:20px;background:#161b22;border:1px solid #388bfd;color:#58a6ff;padding:12px 20px;border-radius:8px;font-size:13px;display:none;z-index:999}
</style>
</head>
<body>

<div id="toast" id="toast">⏳ Carregando...</div>

<div id="pg-setup">
<div class="box">
  <h1>📈 Densidade de Casos Ativos</h1>
  <p class="sub">Registro Consultorias — Dashboard de Análise</p>

  <label>Personal Access Token do Airtable</label>
  <input id="f_token" type="text" placeholder="patXXXXXX.XXXXXXXXXXXXXXXX" autocomplete="off">

  <div class="row2">
    <div><label>Base ID</label><input id="f_base" value="appio7ZC2rZahAJWl"></div>
    <div><label>Table ID</label><input id="f_table" value="tblYq7mKJNQRaiHA3"></div>
  </div>
  <div class="row2">
    <div><label>Campo Início</label><input id="f_start" value="fldZUVJ76Q95Xu1Fi"></div>
    <div><label>Campo Fim</label><input id="f_end" value="fldgbvSx7kxfyYyNz"></div>
  </div>

  <div id="msg"></div>
  <button class="btn-primary" onclick="doLoad()">Carregar Dados</button>

  <div class="note">
    🔒 Token salvo apenas no seu navegador (localStorage). Nenhum dado de pacientes é enviado ao GitHub.<br>
    🔄 Clique em <em>Atualizar</em> para buscar os dados mais recentes do Airtable.
  </div>
</div>
</div>

<div id="pg-app">
  <div class="hdr">
    <h1>📈 Casos Ativos Simultâneos</h1>
    <div class="hbtns">
      <button class="btn-sm" onclick="doRefresh()">🔄 Atualizar</button>
      <button class="btn-sm" onclick="showSetup()">⚙️ Config</button>
    </div>
  </div>
  <div id="tabs"></div>
  <div id="modes">
    <button class="mode on" data-m="daily" onclick="setMode(this)">Diário</button>
    <button class="mode" data-m="weekly" onclick="setMode(this)">Semanal</button>
    <button class="mode" data-m="monthly_max" onclick="setMode(this)">Mensal (Máx)</button>
    <button class="mode" data-m="monthly_avg" onclick="setMode(this)">Mensal (Média)</button>
    <button class="mode" data-m="monthly_med" onclick="setMode(this)">Mensal (Mediana)</button>
  </div>
  <div id="stats"></div>
  <div class="cw"><canvas id="cv"></canvas></div>
</div>

<script>
var G = { year:'total', mode:'daily', data:null };

// Restore saved values
(function(){
  var t=localStorage.getItem('rc_tok'); if(t) document.getElementById('f_token').value=t;
  var b=localStorage.getItem('rc_base'); if(b) document.getElementById('f_base').value=b;
  var tb=localStorage.getItem('rc_tbl'); if(tb) document.getElementById('f_table').value=tb;
  var fs=localStorage.getItem('rc_fs'); if(fs) document.getElementById('f_start').value=fs;
  var fe=localStorage.getItem('rc_fe'); if(fe) document.getElementById('f_end').value=fe;
})();

function showMsg(txt, type) {
  var el=document.getElementById('msg');
  el.textContent=txt; el.className='msg-'+type; el.style.display=txt?'block':'none';
}

function showToast(txt) {
  var el=document.getElementById('toast');
  el.textContent=txt; el.style.display=txt?'block':'none';
}

function showSetup() {
  document.getElementById('pg-setup').style.display='flex';
  document.getElementById('pg-app').style.display='none';
}

function getCfg() {
  return {
    tok: document.getElementById('f_token').value.trim(),
    base: document.getElementById('f_base').value.trim(),
    tbl: document.getElementById('f_table').value.trim(),
    fs: document.getElementById('f_start').value.trim(),
    fe: document.getElementById('f_end').value.trim()
  };
}

function doLoad() {
  var c=getCfg();
  if(!c.tok){showMsg('Informe o token do Airtable.','err');return;}
  if(!c.base||!c.tbl||!c.fs||!c.fe){showMsg('Preencha todos os campos.','err');return;}
  localStorage.setItem('rc_tok',c.tok);
  localStorage.setItem('rc_base',c.base);
  localStorage.setItem('rc_tbl',c.tbl);
  localStorage.setItem('rc_fs',c.fs);
  localStorage.setItem('rc_fe',c.fe);
  showMsg('','info');
  run(c);
}

function doRefresh() {
  var c=getCfg();
  if(!c.tok){showSetup();return;}
  run(c);
}

function run(c) {
  showToast('⏳ Carregando dados do Airtable...');
  fetchAll(c).then(function(records){
    G.data=process(records);
    document.getElementById('pg-setup').style.display='none';
    document.getElementById('pg-app').style.display='block';
    buildTabs();
    buildStats(G.year);
    drawChart();
    showToast('');
  }).catch(function(e){
    showToast('');
    showMsg('Erro: '+e.message,'err');
    document.getElementById('pg-setup').style.display='flex';
  });
}

function fetchAll(c) {
  var today=new Date().toISOString().substring(0,10);
  var records=[];
  function page(offset) {
    var url='https://api.airtable.com/v0/'+c.base+'/'+c.tbl
      +'?fields[]='+encodeURIComponent(c.fs)
      +'&fields[]='+encodeURIComponent(c.fe)
      +'&pageSize=100'
      +(offset?'&offset='+encodeURIComponent(offset):'');
    return fetch(url,{headers:{'Authorization':'Bearer '+c.tok}})
      .then(function(r){
        if(!r.ok) return r.json().then(function(j){
          throw new Error((j.error&&j.error.message)||'HTTP '+r.status);
        });
        return r.json();
      })
      .then(function(d){
        (d.records||[]).forEach(function(r){
          var s=r.fields[c.fs], e=r.fields[c.fe];
          if(!s) return;
          s=String(s).substring(0,10);
          e=e?String(e).substring(0,10):today;
          if(s<=e) records.push({start:s,end:e});
        });
        if(d.offset) return page(d.offset);
        if(records.length===0) throw new Error('Nenhum registro válido. Verifique os IDs dos campos.');
        return records;
      });
  }
  return page(null);
}

function process(recs) {
  var today=new Date().toISOString().substring(0,10);
  var minD=recs[0].start, maxD=recs[0].end;
  recs.forEach(function(r){if(r.start<minD)minD=r.start;if(r.end>maxD)maxD=r.end;});
  if(maxD>today)maxD=today;
  var days=[],d=new Date(minD+'T12:00:00Z'),last=new Date(maxD+'T12:00:00Z');
  while(d<=last){days.push(d.toISOString().substring(0,10));d.setUTCDate(d.getUTCDate()+1);}
  var idx={};days.forEach(function(day,i){idx[day]=i;});
  var counts=new Array(days.length).fill(0);
  recs.forEach(function(r){
    var si=idx[r.start],ei=idx[r.end];
    if(si===undefined||ei===undefined)return;
    for(var i=si;i<=ei;i++)counts[i]++;
  });
  function med(a){if(!a.length)return 0;var s=[].concat(a).sort(function(x,y){return x-y;}),m=Math.floor(s.length/2);return s.length%2===0?Math.round((s[m-1]+s[m])/2*10)/10:s[m];}
  function agg(ds,cs){
    var wL=[],wM=[];
    for(var i=0;i<ds.length;i+=7){wL.push(ds[i]);var ch=cs.slice(i,i+7);wM.push(Math.max.apply(null,ch));}
    var mm={};ds.forEach(function(d,i){var k=d.substring(0,7);if(!mm[k])mm[k]=[];mm[k].push(cs[i]);});
    var mL=Object.keys(mm).sort();
    return{wL:wL,wM:wM,mL:mL,mMx:mL.map(function(k){return Math.max.apply(null,mm[k]);}),
      mAv:mL.map(function(k){return Math.round(mm[k].reduce(function(a,b){return a+b;},0)/mm[k].length*10)/10;}),
      mMd:mL.map(function(k){return med(mm[k]);})};
  }
  var ga=agg(days,counts);
  var years=[...new Set(days.map(function(d){return d.substring(0,4);}))].sort();
  var yd={};
  years.forEach(function(yr){
    var ii=days.map(function(d,i){return d.startsWith(yr)?i:-1;}).filter(function(i){return i>=0;});
    if(!ii.length)return;
    var yDs=ii.map(function(i){return days[i];}),yCs=ii.map(function(i){return counts[i];});
    var ya=agg(yDs,yCs);
    var yr2=yr;
    var yR=recs.filter(function(r){return r.start.substring(0,4)===yr2||r.end.substring(0,4)===yr2||(r.start<yr2+'-01-01'&&r.end>yr2+'-12-31');}).length;
    yd[yr]={labels:yDs,dc:yCs,ya:ya,mx:Math.max.apply(null,yCs),av:Math.round(yCs.reduce(function(a,b){return a+b;},0)/yCs.length*10)/10,md:med(yCs),days:yDs.length,recs:yR};
  });
  var gMx=Math.max.apply(null,counts),gAv=Math.round(counts.reduce(function(a,b){return a+b;},0)/counts.length*10)/10;
  return{days:days,counts:counts,ga:ga,gMx:gMx,gAv:gAv,gMd:med(counts),tDays:days.length,tRecs:recs.length,years:years,yd:yd};
}

function buildTabs(){
  var el=document.getElementById('tabs');
  el.innerHTML='';
  var yrs=G.data.years.concat(['total']);
  yrs.forEach(function(yr){
    var b=document.createElement('button');
    b.className='tab'+(yr===G.year?' on':'');
    b.dataset.y=yr;
    b.textContent=yr==='total'?'Período Total':yr;
    b.setAttribute('onclick','setYear(this)');
    el.appendChild(b);
  });
}

function setYear(btn){
  G.year=btn.dataset.y;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  buildStats(G.year);
  drawChart();
}

function setMode(btn){
  G.mode=btn.dataset.m;
  document.querySelectorAll('.mode').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  if(G.data)drawChart();
}

function buildStats(yr){
  var el=document.getElementById('stats');
  var mx,av,md,rc,dy,rl;
  if(yr==='total'){mx=G.data.gMx;av=G.data.gAv;md=G.data.gMd;rc=G.data.tRecs;dy=G.data.tDays;rl='Total Registros';}
  else{var d=G.data.yd[yr];mx=d.mx;av=d.av;md=d.md;rc=d.recs;dy=d.days;rl='Registros Ativos';}
  function c(l,v,col,s){return '<div class="card"><div class="cl">'+l+'</div><div class="cv" style="color:'+col+'">'+v+'</div><div class="cs">'+s+'</div></div>';}
  el.innerHTML=c('Pico Máximo',mx,'#ff5722','casos/dia')+c('Média Diária',av,'#388bfd','casos/dia')+c('Mediana Diária',md,'#e91e63','casos/dia')+c(rl,rc,'#3fb950','no período')+c('Dias Analisados',dy,'#bc8cff','dias');
}

function drawChart(){
  if(!G.data)return;
  var yr=G.year,mode=G.mode;
  var d=yr==='total'?null:G.data.yd[yr];
  var ga=G.data.ga;
  var ya=d?d.ya:null;
  var src={
    daily:     {l:d?d.labels:G.data.days,   v:d?d.dc:G.data.counts,  lbl:'Casos ativos por dia',  col:'rgba(56,139,253,0.8)'},
    weekly:    {l:d?ya.wL:ga.wL,             v:d?ya.wM:ga.wM,         lbl:'Máx semanal',       col:'rgba(0,188,212,0.8)'},
    monthly_max:{l:d?ya.mL:ga.mL,            v:d?ya.mMx:ga.mMx,       lbl:'Máx mensal',        col:'rgba(255,87,34,0.8)'},
    monthly_avg:{l:d?ya.mL:ga.mL,            v:d?ya.mAv:ga.mAv,       lbl:'Média mensal',      col:'rgba(76,175,80,0.8)'},
    monthly_med:{l:d?ya.mL:ga.mL,            v:d?ya.mMd:ga.mMd,       lbl:'Mediana mensal',        col:'rgba(233,30,99,0.8)'}
  }[mode];
  var ex=Chart.getChart('cv');if(ex)ex.destroy();
  new Chart(document.getElementById('cv'),{
    type:'bar',
    data:{labels:src.l,datasets:[{label:src.lbl,data:src.v,backgroundColor:src.col,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{labels:{color:'#cdd9e5',font:{size:11}}}},
      scales:{x:{ticks:{color:'#8b949e',font:{size:9},maxRotation:45,maxTicksLimit:mode==='daily'?30:20},grid:{color:'#21262d'}},
              y:{min:0,ticks:{color:'#8b949e',font:{size:10}},grid:{color:'#21262d'}}}}
  });
}
</script>
</body>
</html>
